name: Tag Fuzzing
description: Test which HTML tags survive sanitization
body:
  - type: checkboxes
    id: standard-html
    attributes:
      label: Standard HTML Tags
      options:
        - label: '<a href="https://example.com">a-tag</a>'
        - label: '<abbr title="test">abbr</abbr>'
        - label: '<address>address</address>'
        - label: '<article>article</article>'
        - label: '<aside>aside</aside>'
        - label: '<b>bold</b>'
        - label: '<bdi>bdi</bdi>'
        - label: '<bdo dir="rtl">bdo</bdo>'
        - label: '<blockquote>blockquote</blockquote>'
        - label: '<br>after-br'
        - label: '<caption>caption</caption>'
        - label: '<cite>cite</cite>'
        - label: '<code>code</code>'
        - label: '<col><colgroup>colgroup</colgroup>'
        - label: '<data value="1">data</data>'
        - label: '<dd>dd</dd>'
        - label: '<del>deleted</del>'
        - label: '<details open><summary>sum</summary>detail</details>'
        - label: '<dfn>dfn</dfn>'
        - label: '<div>div</div>'
        - label: '<dl><dt>dt</dt><dd>dd</dd></dl>'
        - label: '<em>em</em>'
        - label: '<figcaption>figcaption</figcaption>'
        - label: '<figure>figure</figure>'
        - label: '<footer>footer</footer>'
        - label: '<h1>h1</h1>'
        - label: '<h2>h2</h2>'
        - label: '<h3>h3</h3>'
        - label: '<header>header</header>'
        - label: '<hr>'
        - label: '<i>italic</i>'
        - label: '<img src="x">'
        - label: '<ins>inserted</ins>'
        - label: '<kbd>kbd</kbd>'
        - label: '<li>li</li>'
        - label: '<main>main</main>'
        - label: '<mark>mark</mark>'
        - label: '<nav>nav</nav>'
        - label: '<ol><li>ol-li</li></ol>'
        - label: '<p>paragraph</p>'
        - label: '<picture><source srcset="x"><img src="x"></picture>'
        - label: '<pre>preformatted</pre>'
        - label: '<q>quote</q>'
        - label: '<rp>rp</rp>'
        - label: '<rt>rt</rt>'
        - label: '<ruby>ruby<rt>rt</rt></ruby>'
        - label: '<s>strikethrough</s>'
        - label: '<samp>samp</samp>'
        - label: '<section>section</section>'
        - label: '<small>small</small>'
        - label: '<span>span</span>'
        - label: '<strong>strong</strong>'
        - label: '<sub>sub</sub>'
        - label: '<summary>summary</summary>'
        - label: '<sup>sup</sup>'
        - label: '<table><tr><td>table</td></tr></table>'
        - label: '<tbody><tr><td>tbody</td></tr></tbody>'
        - label: '<td>td</td>'
        - label: '<tfoot><tr><td>tfoot</td></tr></tfoot>'
        - label: '<th>th</th>'
        - label: '<thead><tr><th>thead</th></tr></thead>'
        - label: '<time datetime="2026-01-01">time</time>'
        - label: '<tr><td>tr</td></tr>'
        - label: '<u>underline</u>'
        - label: '<ul><li>ul-li</li></ul>'
        - label: '<var>var</var>'
        - label: '<wbr>wbr'
  - type: checkboxes
    id: dangerous-html
    attributes:
      label: Dangerous Tags
      options:
        - label: '<audio src="x" autoplay>audio</audio>'
        - label: '<base href="https://example.com">'
        - label: '<button>button</button>'
        - label: '<canvas>canvas</canvas>'
        - label: '<dialog open>dialog</dialog>'
        - label: '<embed src="x">'
        - label: '<form action="https://example.com"><input></form>'
        - label: '<iframe src="x"></iframe>'
        - label: '<input type="text" value="x">'
        - label: '<label for="x">label</label>'
        - label: '<link rel="stylesheet" href="x">'
        - label: '<map><area href="x"></map>'
        - label: '<marquee>marquee</marquee>'
        - label: '<meta http-equiv="refresh" content="0;url=x">'
        - label: '<meter value="0.5">meter</meter>'
        - label: '<object data="x">object</object>'
        - label: '<optgroup><option>opt</option></optgroup>'
        - label: '<output>output</output>'
        - label: '<portal src="x">portal</portal>'
        - label: '<progress value="50" max="100">progress</progress>'
        - label: '<script>alert(1)</script>'
        - label: '<select><option>select</option></select>'
        - label: '<slot>slot</slot>'
        - label: '<source srcset="x">'
        - label: '<style>body{display:none}</style>'
        - label: '<template><div>template</div></template>'
        - label: '<textarea>textarea</textarea>'
        - label: '<track src="x">'
        - label: '<video src="x" autoplay>video</video>'
        - label: '<xmp>xmp</xmp>'
  - type: checkboxes
    id: svg-math
    attributes:
      label: SVG and MathML
      options:
        - label: '<svg>svg-test</svg>'
        - label: '<svg><rect width="10" height="10"></rect></svg>'
        - label: '<svg><image href="https://example.com/x.png"></image></svg>'
        - label: '<svg><use href="#x"></use></svg>'
        - label: '<svg><foreignObject><div xmlns="http://www.w3.org/1999/xhtml">fo-test</div></foreignObject></svg>'
        - label: '<svg><a href="https://example.com"><text>svg-link</text></a></svg>'
        - label: '<svg><script>alert(1)</script></svg>'
        - label: '<svg><animate attributeName="href" values="javascript:alert(1)"></animate></svg>'
        - label: '<math>math-test</math>'
        - label: '<math><annotation-xml encoding="text/html"><img src=x onerror=alert(1)></annotation-xml></math>'
        - label: '<math><mi><annotation-xml encoding="application/xhtml+xml"><a xmlns="http://www.w3.org/1999/xhtml" href="https://example.com">math-link</a></annotation-xml></mi></math>'
  - type: checkboxes
    id: github-custom
    attributes:
      label: GitHub Custom Elements
      options:
        - label: '<include-fragment src="/manifest.json"></include-fragment>'
        - label: '<poll-include-fragment src="/manifest.json"></poll-include-fragment>'
        - label: '<remote-input src="/search/suggestions"></remote-input>'
        - label: '<auto-complete src="/search/suggestions"></auto-complete>'
        - label: '<clipboard-copy value="stolen">copy</clipboard-copy>'
        - label: '<details-menu src="/settings">menu</details-menu>'
        - label: '<file-attachment><input type="file"></file-attachment>'
        - label: '<filter-input></filter-input>'
        - label: '<fuzzy-list></fuzzy-list>'
        - label: '<image-crop src="x"></image-crop>'
        - label: '<markdown-toolbar for="x">toolbar</markdown-toolbar>'
        - label: '<math-renderer>x^2</math-renderer>'
        - label: '<modal-dialog>dialog</modal-dialog>'
        - label: '<notification-indicator></notification-indicator>'
        - label: '<paste-markdown></paste-markdown>'
        - label: '<quote-selection></quote-selection>'
        - label: '<react-app>app</react-app>'
        - label: '<relative-time datetime="2026-01-01">time</relative-time>'
        - label: '<scrollable-region>scroll</scrollable-region>'
        - label: '<tab-container>tabs</tab-container>'
        - label: '<task-lists>tasks</task-lists>'
        - label: '<text-expander>expander</text-expander>'
        - label: '<tool-tip>tooltip</tool-tip>'
        - label: '<turbo-frame src="/manifest.json">turbo</turbo-frame>'
        - label: '<virtual-filter-input></virtual-filter-input>'
  - type: checkboxes
    id: attributes
    attributes:
      label: Attribute Tests
      options:
        - label: '<div style="color:red">inline-style</div>'
        - label: '<div class="btn btn-primary">class-attr</div>'
        - label: '<div id="injected">id-attr</div>'
        - label: '<div data-action="click->test#fire">data-action</div>'
        - label: '<div data-target="test.output">data-target</div>'
        - label: '<div data-controller="test">data-controller</div>'
        - label: '<a href="javascript:alert(1)">js-href</a>'
        - label: '<a href="data:text/html,<h1>test</h1>">data-href</a>'
        - label: '<a href="//evil.com">proto-relative</a>'
        - label: '<img src="x" loading="lazy">'
        - label: '<img src="x" decoding="async">'
        - label: '<img src="x" srcset="y 2x">'
        - label: '<img src="x" ismap>'
        - label: '<img src="x" usemap="#map">'
        - label: '<a href="https://example.com" ping="https://example.com/track">ping-attr</a>'
        - label: '<a href="https://example.com" download="file.txt">download-attr</a>'
        - label: '<div tabindex="0" onfocus="alert(1)">tabindex-onfocus</div>'
        - label: '<div contenteditable="true">contenteditable</div>'
        - label: '<div draggable="true">draggable</div>'
        - label: '<img src="x" crossorigin="anonymous">'
        - label: '<img src="x" referrerpolicy="no-referrer">'
